<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | LIBRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="logo"><a href="homePage.html">LIBRO<span>.</span></a></h2>
                <p>Створіть свій аккаунт для затишного читання</p>
            </div>

            <form name="singUp" id="registerForm" action="singUp_process.php" method="POST" novalidate>
            
                <div class="form-group">
                    <label for="name">Прізвище та ім'я</label>
                    <input type="text" id="name" name="username">
                </div>
            
                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com">
                </div>
            
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password">
                </div>
            
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms" name="terms" value="accepted">
                    <label for="terms">Я згоден з умовами використання</label>
                </div>
            
                <p id="error" class="error-message"></p>
                <button type="button" id="registerButton" class="btn-auth" onclick="submitSignUpForm(event)">Зареєструватися</button>
            </form>

            <script>
                async function submitSignUpForm(event) {
                    event.preventDefault();
                    const form = document.getElementById('registerForm');
                    const errorMessage = document.getElementById('error');
                    if (errorMessage) {
                        errorMessage.style.display = 'none';
                    }

                    const name = document.getElementById('name').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value.trim();
                    const terms = document.getElementById('terms');

                    const errorText = validateSignUpForm(name, email, password, terms);
                    if (errorText) {
                        if (errorMessage) {
                            errorMessage.textContent = errorText;
                            errorMessage.style.display = 'block';
                        } else {
                            alert(errorText);
                        }
                        return;
                    }

                    try {
                        const formData = new FormData(form);
                        const response = await fetch(form.action, {
                            method: 'POST',
                            body: formData,
                        });
                        const result = await response.json();
                        if (!result.success) {
                            throw new Error(result.message || 'Невідома помилка');
                        }
                        alert('Реєстрація успішна!');
                        form.reset();
                    } catch (error) {
                        alert('Помилка реєстрації: ' + error.message);
                    }
                }

                function validateSignUpForm(name, email, password, terms) {
                    if (name === '' || email === '' || password === '') {
                        return 'Будь ласка, заповніть усі поля!';
                    }
                    const namePattern = /^[a-zA-Zа-яА-ЯіїєґІЇЄҐ]+\s[a-zA-Zа-яА-ЯіїєґІЇЄҐ]+$/;
                    if (!namePattern.test(name)) {
                        return 'Введіть своє прізвище та імя через пробіл';
                    }
                    const emailPattern = /^[^\s@]+@[^\s@]+\.com$/;
                    if (!emailPattern.test(email)) {
                        return 'Неправильний формат пошти';
                    }
                    const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}$/;
                    if (!passwordPattern.test(password)) {
                        return 'Пароль має бути не менше 8 символів та містити велику літеру, малу літеру та спецсимвол';
                    }
                    if (!terms.checked) {
                        return 'Ви повинні погодитися з умовами';
                    }
                    return '';
                }
            </script>
            <script src="auth.js"></script>
            
            <div class="auth-footer">
                <p>Вже маєте профіль? <a href="logIn.html">Увійти</a></p>
            </div>
        </div>
    </div>
</body>
</html>
