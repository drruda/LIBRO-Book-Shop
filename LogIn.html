<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | LIBRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="logo"><a href="homePage.html">LIBRO<span>.</span></a></h2>
                <p>Створіть свій аккаунт для затишного читання</p>
            </div>

            <form name="logIn" id="loginForm" action="login_process.php" method="POST" novalidate>
                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password">
                </div>

                <p id="error" class="error-message"></p>
                <button type="submit" class="btn-auth">Увійти</button>
            </form>

            <script src="logIn_validation.js"></script>
            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const form = document.getElementById('loginForm');
                    const errorEl = document.getElementById('error');

                    form.addEventListener('submit', async (event) => {
                        event.preventDefault();
                        errorEl.style.display = 'none';

                        const email = document.getElementById('email').value.trim();
                        const password = document.getElementById('password').value;

                        if (email === '' || password === '') {
                            alert('Будь ласка, заповніть усі поля.');
                            return;
                        }

                        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if (!emailPattern.test(email)) {
                            alert('Неправильний формат пошти.');
                            return;
                        }

                        if (password.length < 8) {
                            alert('Пароль має бути не менше 8 символів.');
                            return;
                        }

                        try {
                            const formData = new FormData(form);
                            const response = await fetch(form.action, {
                                method: 'POST',
                                body: formData,
                            });
                            const result = await response.json();
                            if (!result.success) {
                                alert(result.message || 'Неправильний email або пароль.');
                                return;
                            }
                            alert(result.message || 'Вхід успішний.');
                            window.location.href = 'homePage.html';
                        } catch (error) {
                            alert('Помилка входу. Спробуйте ще раз.');
                        }
                    });
                });
            </script>
            <script src="auth.js"></script>

            <div class="auth-footer">
                <p>Ще не маєте профіля? <a href="signUp.html">Зареєструватися</a></p>
            </div>
        </div>
    </div>
</body>
</html>
